name: Build

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install toolchain
        run: brew install aarch64-elf-gcc aarch64-elf-binutils dosfstools

      - name: Get mcc compiler
        run: |
          brew trust fecabrera/mcc
          brew tap fecabrera/mcc
          brew install mcc

      - name: Build
        run: |
          chmod a+x ./build.sh
          ./build.sh

      - name: Upload kernel binaries
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: |
            kernel.elf
            kernel.img
            init.img
            init/bin/*
            user/*.a
