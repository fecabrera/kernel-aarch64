name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Symlink cross-compiler to expected names
        run: |
          sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc  /usr/local/bin/aarch64-elf-gcc
          sudo ln -sf /usr/bin/aarch64-linux-gnu-ld   /usr/local/bin/aarch64-elf-ld
          sudo ln -sf /usr/bin/aarch64-linux-gnu-objcopy /usr/local/bin/aarch64-elf-objcopy

      - name: Build
        run: make
